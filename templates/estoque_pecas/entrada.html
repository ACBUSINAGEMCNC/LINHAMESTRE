<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrada de Peças - ACB Usinagem CNC</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">ACB Usinagem CNC</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="fas fa-home"></i> Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/estoque"><i class="fas fa-warehouse"></i> Estoque de Materiais</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/estoque-pecas"><i class="fas fa-boxes"></i> Estoque de Peças</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Entrada de Peças</h1>
            <a href="/estoque-pecas" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Voltar
            </a>
        </div>

        <div class="card">
            <div class="card-body">
                <form method="POST" action="/estoque-pecas/entrada">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="item_id" class="form-label">Item</label>
                            <select class="form-select select2" id="item_id" name="item_id" required>
                                <option value="">Selecione um item</option>
                                {% for item in itens %}
                                <option value="{{ item.id }}" data-codigo="{{ item.codigo_acb }}" data-nome="{{ item.nome }}" data-imagem="{{ item.imagem_path or '' }}">{{ item.codigo_acb }} - {{ item.nome }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="quantidade" class="form-label">Quantidade</label>
                            <input type="number" class="form-control" id="quantidade" name="quantidade" min="1" required>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-3">
                            <label for="estante" class="form-label">Estante</label>
                            <select class="form-select" id="estante" name="estante">
                                <option value="">--</option>
                                {% for n in range(1, 9) %}
                                <option value="{{ n }}">{{ n }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label for="secao" class="form-label">Seção</label>
                            <select class="form-select" id="secao" name="secao">
                                <option value="">--</option>
                                {% for n in range(1, 5) %}
                                <option value="{{ n }}">{{ n }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label for="linha" class="form-label">Linha</label>
                            <select class="form-select" id="linha" name="linha">
                                <option value="">--</option>
                                {% for n in range(1, 3) %}
                                <option value="{{ n }}">{{ n }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label for="coluna" class="form-label">Coluna</label>
                            <select class="form-select" id="coluna" name="coluna">
                                <option value="">--</option>
                                {% for n in range(1, 11) %}
                                <option value="{{ n }}">{{ n }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="referencia" class="form-label">Referência</label>
                            <input type="text" class="form-control" id="referencia" name="referencia" placeholder="Número de OS, pedido, etc.">
                        </div>
                        <div class="col-md-6">
                            <label for="observacao" class="form-label">Observação</label>
                            <textarea class="form-control" id="observacao" name="observacao" rows="3"></textarea>
                        </div>
                    </div>
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save"></i> Registrar Entrada
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script>
        $(document).ready(function() {
            function formatItem(item) {
                if (!item.id) {
                    return item.text;
                }
                const $el = $(item.element);
                const codigo = $el.data('codigo') || '';
                const nome = $el.data('nome') || '';
                const img = $el.data('imagem') || '';

                const $container = $('<div class="d-flex align-items-center gap-2"></div>');
                if (img) {
                    $container.append($('<img>').attr('src', img).css({ width: '34px', height: '34px', objectFit: 'cover', borderRadius: '6px', border: '1px solid #ddd' }));
                }
                const $txt = $('<div></div>');
                $txt.append($('<div class="fw-semibold"></div>').text((codigo ? codigo + ' - ' : '') + nome));
                $container.append($txt);
                return $container;
            }

            $('.select2').select2({
                theme: 'bootstrap-5',
                width: '100%',
                templateResult: formatItem,
                templateSelection: formatItem
            });
        });
    </script>
</body>
</html>
