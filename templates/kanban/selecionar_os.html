<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selecionar OS - Kanban</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                <img src="/static/logo_acb.png" alt="ACB" style="height: 28px; width: auto;" onerror="this.onerror=null;this.src='/static/logo.svg';">
                <span>ARTCOMPANY</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/pedidos"><i class="fas fa-clipboard-list"></i> Pedidos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/kanban"><i class="fas fa-columns"></i> Kanban</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="mb-1">Selecionar Ordem de Serviço</h1>
                <div class="text-muted">Pedido: <strong>{{ pedido.numero_pedido or ('#' ~ pedido.id) }}</strong></div>
            </div>
            <div class="d-flex gap-2">
                <a href="/pedidos" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Voltar
                </a>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Este pedido possui {{ ordens|length }} OS</h5>
            </div>
            <div class="card-body">
                <div class="list-group">
                    {% for os in ordens %}
                        <a class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" href="/kanban/por-numero/{{ os.numero }}">
                            <div>
                                <div class="fw-semibold">{{ os.numero }}</div>
                                <div class="text-muted" style="font-size: 12px;">Status: {{ os.status }}</div>
                            </div>
                            <i class="fas fa-arrow-right"></i>
                        </a>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
