<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Item de Consumo - ACB</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
            <img src="/static/logo_acb.png" alt="ACB" style="height:28px;" onerror="this.onerror=null;this.src='/static/logo.svg';">
            <span>ARTCOMPANY</span>
        </a>
    </div>
</nav>

<div class="container py-4" style="max-width:600px;">
    <h1 class="mb-4">Novo Item de Consumo</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
        {% endfor %}
    {% endwith %}

    <div class="card">
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Código</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="fas fa-tag text-primary"></i></span>
                        <input type="text" class="form-control bg-light fw-bold text-primary" value="{{ proximo_codigo }}" readonly>
                    </div>
                    <small class="text-muted">Gerado automaticamente pelo sistema.</small>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Nome <span class="text-danger">*</span></label>
                    <input type="text" name="nome" class="form-control" placeholder="Ex: Óleo hidráulico ISO 68" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Descrição</label>
                    <textarea name="descricao" class="form-control" rows="2" placeholder="Informações adicionais (opcional)"></textarea>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Categoria</label>
                        <input type="text" name="categoria" class="form-control" list="categorias_sugeridas" placeholder="Ex: Lubrificantes, EPI, Limpeza">
                        <datalist id="categorias_sugeridas">
                            <option value="Lubrificantes">
                            <option value="EPI">
                            <option value="Limpeza">
                            <option value="Ferramentas">
                            <option value="Materiais Elétricos">
                            <option value="Materiais de Fixação">
                            <option value="Montagem">
                            <option value="Outros">
                        </datalist>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Unidade</label>
                        <select name="unidade" class="form-select">
                            <option value="un">un (unidade)</option>
                            <option value="L">L (litros)</option>
                            <option value="kg">kg</option>
                            <option value="m">m (metros)</option>
                            <option value="cx">cx (caixa)</option>
                            <option value="pc">pc (peça)</option>
                            <option value="par">par</option>
                            <option value="rolo">rolo</option>
                        </select>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Salvar</button>
                    <a href="/consumo/itens" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
